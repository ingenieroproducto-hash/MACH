plugins {
    id 'com.android.application'
}

android {
    namespace 'com.mach.entregas'
    compileSdk 35

    defaultConfig {
        applicationId 'com.mach.entregas'
        minSdk 26
        targetSdk 35
        versionCode 4
        versionName '1.3'
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}
